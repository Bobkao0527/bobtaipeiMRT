<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Bob高科技轉乘系統</title>
    
    <!-- 使用 GitHub 圖床的自訂圖示 -->
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/Bobkao0527/bobtaipeiMRT/20296ecd31b8fa2372a545c4e5f991954d6b29ac/icon.jpeg">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+TC:wght@400;700&display=swap');
        
        :root {
            --neon-blue: #00f2ff;
            --neon-green: #4ade80;
            --neon-red: #ff4444;
            --dark-bg: #020617;
        }

        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: var(--dark-bg);
            color: #e2e8f0;
            padding-top: env(safe-area-inset-top);
        }

        .cyber-font {
            font-family: 'Orbitron', sans-serif;
        }

        .journey-card {
            background: rgba(15, 23, 42, 0.8);
            border-radius: 1.25rem;
            border: 1px solid rgba(0, 242, 255, 0.15);
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            backdrop-filter: blur(12px);
            position: relative;
            transition: all 0.3s ease;
        }

        /* 沒車時的紅色風格 */
        .journey-card.out-of-service {
            border: 1px solid rgba(255, 68, 68, 0.4);
            box-shadow: 0 0 25px rgba(255, 68, 68, 0.1);
        }

        .journey-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-green), transparent);
            animation: scan 4s linear infinite;
        }

        .journey-card.out-of-service::before {
            background: linear-gradient(90deg, transparent, var(--neon-red), transparent);
        }

        @keyframes scan {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .step-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 1.25rem 0.75rem;
            position: relative;
            background: linear-gradient(90deg, rgba(0, 242, 255, 0.03) 0%, rgba(74, 222, 128, 0.03) 100%);
        }

        .out-of-service .step-row {
            background: linear-gradient(90deg, rgba(255, 68, 68, 0.05) 0%, transparent 100%);
        }

        .step-row:not(:last-child) {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .time-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 62px;
        }

        .time-dep {
            @apply cyber-font text-xl font-bold tracking-tight;
            color: var(--neon-blue);
            text-shadow: 0 0 12px rgba(0, 242, 255, 0.6);
        }

        .time-arr {
            @apply cyber-font text-xl font-bold tracking-tight;
            color: var(--neon-green);
            text-shadow: 0 0 12px rgba(74, 222, 128, 0.6);
        }

        .route-visual {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
        }

        .station-name {
            @apply text-[13px] font-bold text-white whitespace-nowrap;
        }

        .connector-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--neon-blue) 0%, var(--neon-green) 100%);
            position: relative;
            min-width: 25px;
            opacity: 0.6;
        }

        .out-of-service .connector-line {
            background: var(--neon-red);
            opacity: 0.3;
        }

        .btn-next-bus {
            @apply w-full py-4 px-4 bg-slate-900/60 text-cyan-400 font-bold text-xs tracking-[0.2em] transition-all active:bg-cyan-950/50 flex items-center justify-center gap-2 border-t border-white/5;
        }
        
        .btn-next-bus:disabled {
            @apply text-slate-700 bg-slate-900/20 cursor-not-allowed;
        }

        .label-text {
            @apply text-[8px] font-bold uppercase tracking-widest mb-0.5;
        }

        .btn-lock {
            @apply flex items-center justify-center gap-2 px-3 py-2 rounded-full border-2 transition-all duration-300 text-[11px] font-black tracking-[0.05em] shadow-lg active:scale-95;
            min-width: 130px;
        }
        .btn-lock.unlocked {
            @apply border-emerald-500/50 text-emerald-400 bg-emerald-500/5 hover:bg-emerald-500/10;
            box-shadow: inset 0 0 10px rgba(16, 185, 129, 0.1);
        }
        .btn-lock.locked {
            @apply border-red-500 text-red-500 bg-red-500/10 animate-pulse;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.3), inset 0 0 10px rgba(239, 68, 68, 0.2);
        }

        .error-text {
            @apply text-red-500 font-bold text-sm cyber-font tracking-tighter;
            text-shadow: 0 0 8px rgba(255, 68, 68, 0.4);
        }

        /* 彈窗 UI 升級 */
        #data-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.98);
            z-index: 1000;
            padding: 20px;
            backdrop-filter: blur(20px);
            flex-direction: column;
        }

        .table-container {
            flex: 1;
            overflow: auto;
            border: 1px solid rgba(0, 242, 255, 0.2);
            background: rgba(15, 23, 42, 0.4);
            border-radius: 12px;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        /* 頂部掃描條效果 */
        .table-container::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 242, 255, 0.02) 2px, rgba(0, 242, 255, 0.02) 4px);
            pointer-events: none;
        }

        #raw-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 12px;
            color: #94a3b8;
        }

        #raw-table th {
            @apply sticky top-0 z-10 p-4 text-cyan-400 cyber-font font-bold border-b border-cyan-500/40 bg-slate-900/90;
            text-align: left;
            text-shadow: 0 0 8px rgba(0, 242, 255, 0.5);
            backdrop-filter: blur(5px);
        }

        #raw-table td {
            @apply p-4 border-b border-white/5 transition-all duration-200;
        }

        #raw-table tr:hover td {
            @apply bg-cyan-500/10 text-white;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.3);
        }

        #raw-table td.time-cell {
            @apply cyber-font font-bold text-cyan-500;
        }

        .modal-header-line {
            height: 1px;
            background: linear-gradient(90deg, var(--neon-blue), transparent);
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body class="min-h-screen pb-10">

    <div class="max-w-md mx-auto px-4 py-6">
        <header class="mb-6 flex justify-between items-center border-b border-slate-800 pb-5">
            <div class="flex-1">
                <div class="flex items-center gap-2">
                    <h1 id="title-text" class="text-lg cyber-font font-bold tracking-[0.2em] text-white">即時通勤計算系統</h1>
                </div>
                <div id="location-status" class="text-[10px] font-bold text-slate-500 mt-1 flex items-center gap-2 tracking-widest">
                    <span id="location-dot" class="w-2 h-2 rounded-full bg-slate-700 animate-pulse"></span>
                    <span id="location-text">等待定位...</span>
                </div>
            </div>
            
            <div class="flex flex-col items-end gap-3">
                <div class="text-right">
                    <p id="current-time-display" class="cyber-font text-2xl font-bold text-cyan-400" style="text-shadow: 0 0 10px rgba(0, 242, 255, 0.3);">--:--</p>
                </div>
                
                <button id="lock-toggle" class="btn-lock unlocked">
                    <span id="lock-icon">●</span>
                    <span id="lock-text-btn">按此鎖定時刻表</span>
                </button>
            </div>
        </header>

        <div id="main-container" class="space-y-6">
            <div class="flex flex-col items-center justify-center py-20 gap-4">
                <div class="w-10 h-10 border border-cyan-500/30 border-t-cyan-400 rounded-full animate-spin"></div>
                <p class="cyber-font text-[10px] text-cyan-900 tracking-[0.5em]">系統初始化中</p>
            </div>
        </div>

        <!-- 查看全部按鈕 -->
        <div class="mt-8">
            <button onclick="openModal()" class="w-full py-4 rounded-xl border border-cyan-500/30 bg-cyan-500/5 text-cyan-400 cyber-font text-[11px] tracking-[0.3em] font-bold active:bg-cyan-500/10 active:scale-[0.98] transition-all flex items-center justify-center gap-3">
                <span class="animate-pulse">▶</span> DATA EXPLORER / 查看完整時刻表
            </button>
        </div>
    </div>

    <!-- 數據彈窗 -->
    <div id="data-modal">
        <div class="flex justify-between items-center mb-1">
            <div class="flex flex-col">
                <h2 class="text-white cyber-font font-bold tracking-widest text-lg">SYSTEM DATA LOGS</h2>
                <span class="text-[8px] text-cyan-700 cyber-font">ACCESSING REALTIME_DB_V2 // COL 0-5</span>
            </div>
            <button onclick="closeModal()" class="text-red-400 cyber-font font-bold px-4 py-2 border border-red-500/30 rounded-lg bg-red-500/5 active:scale-95 transition-all text-xs">
                TERMINATE [X]
            </button>
        </div>
        <div class="modal-header-line"></div>
        <div class="table-container" id="table-wrap">
            <table id="raw-table">
                <!-- JavaScript 動態插入 -->
            </table>
        </div>
        <div class="mt-4 flex justify-between items-center px-2">
            <span class="text-[9px] text-slate-600 cyber-font">ENCRYPTED END-TO-END</span>
            <span class="text-[9px] text-cyan-900 cyber-font" id="row-count">ROWS: --</span>
        </div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTW2l0HWECp7aHxDU3gO4KCzqYnTfwuujaHqYnciuMgyF3LbEJQQVq-aGPKBYLEtNnt46n4y48Adjl5/pub?output=csv';
        const CACHE_KEY = 'bus_timetable_data';
        const LOCK_KEY = 'bus_locked_data';

        const STATION_COORDS = {
            '公館': { lat: 25.01499, lng: 121.53423 },
            '中正紀念堂': { lat: 25.03281, lng: 121.51826 },
            '奇岩': { lat: 25.12565, lng: 121.50104 },
            '淡水': { lat: 25.16808, lng: 121.44551 }
        };

        const JOURNEYS = [
            {
                id: 'SOUTH',
                name: "往南：淡水 ➔ 中正紀念堂 ➔ 公館",
                type: 'fixed',
                startFrom: '淡水',
                steps: [
                    { col: 0, from: '淡水', to: '中正紀念堂', travelTime: 42 },
                    { col: 1, from: '中正紀念堂', to: '公館', travelTime: 6 }
                ]
            },
            {
                id: 'NORTH_DYNAMIC',
                name: "往北：公館 ➔ 中正紀念堂 ➔ 淡水",
                type: 'dynamic_north',
                startFrom: '公館',
                startStep: { col: 2, from: '公館', to: '中正紀念堂', travelTime: 6 },
                options: [
                    { col: 3, from: '中正紀念堂', to: '淡水', travelTime: 44, isDirect: true },
                    { col: 4, from: '中正紀念堂', to: '奇岩', travelTime: 25, isDirect: false, next: { col: 5, from: '奇岩', to: '淡水', travelTime: 19 } }
                ]
            }
        ];

        let journeyOffsets = { 'SOUTH': 0, 'NORTH_DYNAMIC': 0 };
        let userLocation = null;
        let isLocked = false;

        function updateClock() {
            const now = new Date();
            const hh = now.getHours().toString().padStart(2, '0');
            const mm = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('current-time-display').innerText = `${hh}:${mm}`;
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function addMinutes(hhmm, mins) {
            let h = parseInt(hhmm.substring(0, 2)), m = parseInt(hhmm.substring(2, 4)) + mins;
            h += Math.floor(m / 60); m = m % 60;
            h = h % 24;
            return h.toString().padStart(2, '0') + m.toString().padStart(2, '0');
        }

        function formatTime(hhmm) { return hhmm.substring(0, 2) + ':' + hhmm.substring(2, 4); }

        function toggleNextBus(journeyId) {
            if (isLocked) return;
            journeyOffsets[journeyId] = (journeyOffsets[journeyId] + 1) % 3;
            updateUI();
        }

        /* 彈窗邏輯 */
        function openModal() {
            renderRawTable();
            document.getElementById('data-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('data-modal').style.display = 'none';
        }

        function renderRawTable() {
            if (!window.csvData) return;
            const lines = window.csvData.split('\n');
            const rows = lines.map(line => line.split(',').map(cell => cell.trim()));
            const table = document.getElementById('raw-table');
            
            let html = `<thead><tr>`;
            for (let i = 0; i <= 5; i++) {
                html += `<th>${rows[0][i] || `CH_${i}`}</th>`;
            }
            html += `</tr></thead><tbody>`;

            let validRowCount = 0;
            for (let r = 1; r < rows.length; r++) {
                if (rows[r].every(c => !c)) continue;
                validRowCount++;
                html += `<tr>`;
                for (let c = 0; c <= 5; c++) {
                    let val = rows[r][c] || "-";
                    let isTime = /^\d{4}$/.test(val);
                    let displayVal = isTime ? formatTime(val) : val;
                    html += `<td class="${isTime ? 'time-cell' : ''}">${displayVal}</td>`;
                }
                html += `</tr>`;
            }
            table.innerHTML = html + `</tbody>`;
            document.getElementById('row-count').innerText = `RECORDS_COUNT: ${validRowCount}`;
        }

        function applyLockVisuals(locked) {
            const btn = document.getElementById('lock-toggle');
            const icon = document.getElementById('lock-icon');
            const text = document.getElementById('lock-text-btn');
            const title = document.getElementById('title-text');

            if (locked) {
                btn.className = "btn-lock locked";
                icon.innerText = "■";
                text.innerText = "時間已鎖定";
                title.innerText = "時間已錨定";
                title.classList.add('text-red-500');
            } else {
                btn.className = "btn-lock unlocked";
                icon.innerText = "●";
                text.innerText = "按此鎖定時刻表";
                title.innerText = "即時通勤計算系統";
                title.classList.remove('text-red-500');
            }
        }

        document.getElementById('lock-toggle').onclick = () => {
            isLocked = !isLocked;
            applyLockVisuals(isLocked);

            if (isLocked) {
                const currentContent = document.getElementById('main-container').innerHTML;
                const state = {
                    html: currentContent,
                    offsets: JSON.parse(JSON.stringify(journeyOffsets))
                };
                localStorage.setItem(LOCK_KEY, JSON.stringify(state));
            } else {
                localStorage.removeItem(LOCK_KEY);
                journeyOffsets = { 'SOUTH': 0, 'NORTH_DYNAMIC': 0 };
                updateUI();
            }
        };

        async function init() {
            updateClock();

            const lockStore = localStorage.getItem(LOCK_KEY);
            if (lockStore) {
                const state = JSON.parse(lockStore);
                isLocked = true;
                journeyOffsets = state.offsets;
                applyLockVisuals(true);
                document.getElementById('main-container').innerHTML = state.html;
            }

            const cachedData = localStorage.getItem(CACHE_KEY);
            if (cachedData) {
                window.csvData = cachedData;
                if (!isLocked) updateUI();
            }

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    const dot = document.getElementById('location-dot');
                    dot.classList.replace('bg-slate-700', 'bg-cyan-400');
                    dot.classList.add('shadow-[0_0_8px_#00f2ff]');
                    document.getElementById('location-text').innerText = '定位同步中';
                    if (!isLocked) updateUI();
                }, () => {
                    document.getElementById('location-text').innerText = '定位未授權';
                });
            }

            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                window.csvData = text;
                localStorage.setItem(CACHE_KEY, text);
                if (!isLocked) updateUI();
            } catch (e) {
                console.error("CSV 更新失敗");
            }

            setInterval(updateClock, 10000);
            setInterval(() => {
                if (!isLocked) updateUI();
            }, 30000);
        }

        function renderStep(from, to, depTime, arrTime) {
            return `
                <div class="step-row">
                    <div class="time-box">
                        <span class="label-text text-cyan-900">發車</span>
                        <span class="time-dep">${formatTime(depTime)}</span>
                    </div>
                    <div class="route-visual">
                        <span class="station-name">${from}</span>
                        <div class="connector-line"></div>
                        <span class="station-name">${to}</span>
                    </div>
                    <div class="time-box">
                        <span class="label-text text-green-900">抵達</span>
                        <span class="time-arr">${formatTime(arrTime)}</span>
                    </div>
                </div>
            `;
        }

        function getBestTime(rows, col, filterTime, offset = 0) {
            let times = [];
            for (let r = 1; r < rows.length; r++) {
                const t = rows[r][col];
                if (t && /^\d{4}$/.test(t)) {
                    if (t >= filterTime) times.push(t);
                }
            }
            times.sort();
            return times[offset] || null;
        }

        function updateUI() {
            if (isLocked || !window.csvData) return;
            
            const rows = window.csvData.split('\n').map(r => r.split(',').map(c => c.trim()));
            const container = document.getElementById('main-container');
            const now = new Date();
            const currentHHMM = now.getHours().toString().padStart(2, '0') + now.getMinutes().toString().padStart(2, '0');
            
            container.innerHTML = '';

            let sortedJourneys = [...JOURNEYS];
            if (userLocation) {
                const distToGongguan = getDistance(userLocation.lat, userLocation.lng, STATION_COORDS['公館'].lat, STATION_COORDS['公館'].lng);
                const distToTamsui = getDistance(userLocation.lat, userLocation.lng, STATION_COORDS['淡水'].lat, STATION_COORDS['淡水'].lng);

                if (distToGongguan < 2) {
                    sortedJourneys.sort((a, b) => a.id === 'NORTH_DYNAMIC' ? -1 : 1);
                    document.getElementById('location-text').innerText = '靠近公館站';
                } else if (distToTamsui < 2) {
                    sortedJourneys.sort((a, b) => a.id === 'SOUTH' ? -1 : 1);
                    document.getElementById('location-text').innerText = '靠近淡水站';
                }
            }

            sortedJourneys.forEach(journey => {
                const offset = journeyOffsets[journey.id];
                const card = document.createElement('div');
                card.className = "journey-card flex flex-col";
                let timelineHtml = "";
                let possible = true;
                let noMoreBus = false;

                if (journey.type === 'fixed') {
                    let lastTime = currentHHMM;
                    for (let i = 0; i < journey.steps.length; i++) {
                        const step = journey.steps[i];
                        let dep = getBestTime(rows, step.col, i === 0 ? currentHHMM : lastTime, i === 0 ? offset : 0);
                        if (!dep) { 
                            possible = false; 
                            noMoreBus = true;
                            break; 
                        }
                        let arr = addMinutes(dep, step.travelTime);
                        timelineHtml += renderStep(step.from, step.to, dep, arr);
                        lastTime = arr;
                    }
                } else if (journey.type === 'dynamic_north') {
                    let dep1 = getBestTime(rows, journey.startStep.col, currentHHMM, offset);
                    if (!dep1) {
                        possible = false;
                        noMoreBus = true;
                    } else {
                        let arr1 = addMinutes(dep1, journey.startStep.travelTime);
                        timelineHtml += renderStep(journey.startStep.from, journey.startStep.to, dep1, arr1);
                        
                        let candidates = journey.options.map(opt => {
                            let depNext = getBestTime(rows, opt.col, arr1, 0);
                            return depNext ? { ...opt, depNext } : null;
                        }).filter(c => c !== null);

                        if (candidates.length === 0) {
                            possible = false;
                            noMoreBus = true;
                        } else {
                            candidates.sort((a, b) => a.depNext.localeCompare(b.depNext));
                            let best = candidates[0];
                            let arrNext = addMinutes(best.depNext, best.travelTime);
                            timelineHtml += renderStep(best.from, best.to, best.depNext, arrNext);
                            
                            if (best.next) {
                                let depFinal = getBestTime(rows, best.next.col, arrNext, 0);
                                if (depFinal) {
                                    let arrFinal = addMinutes(depFinal, best.next.travelTime);
                                    timelineHtml += renderStep(best.next.from, best.next.to, depFinal, arrFinal);
                                } else {
                                    possible = false;
                                    noMoreBus = true;
                                }
                            }
                        }
                    }
                }

                if (!possible && noMoreBus) {
                    card.classList.add('out-of-service');
                    card.innerHTML = `
                        <div class="px-4 py-3 bg-red-950/20 border-b border-red-500/20">
                            <h2 class="text-[9px] font-bold text-red-500 tracking-[0.2em] mb-0.5 uppercase">SECURITY ALERT: SERVICE ENDED</h2>
                            <div class="text-xs font-bold text-red-200 tracking-wide">${journey.name}</div>
                        </div>
                        <div class="step-row justify-center py-10 flex-col gap-2">
                            <div class="error-text">已經來不及趕上末班車</div>
                            <div class="text-[10px] text-red-900 cyber-font">CRITICAL: NO_SCHEDULE_FOUND</div>
                        </div>
                        <button class="btn-next-bus" disabled>
                            <span>掃描失效</span>
                        </button>
                    `;
                } else if (possible) {
                    card.innerHTML = `<div class="px-4 py-3 bg-slate-900/40 border-b border-white/5"><h2 class="text-[9px] font-bold text-cyan-800 tracking-[0.2em] mb-0.5 uppercase">智能導航協議</h2><div class="text-xs font-bold text-slate-100 tracking-wide">${journey.name}</div></div>` + timelineHtml;
                    const nextBtn = document.createElement('button');
                    nextBtn.className = "btn-next-bus cyber-font";
                    nextBtn.innerHTML = `<span>掃描後續班次 (+${offset})</span>`;
                    nextBtn.onclick = (e) => {
                        e.stopPropagation();
                        toggleNextBus(journey.id);
                    };
                    card.appendChild(nextBtn);
                } else {
                    return;
                }
                container.appendChild(card);
            });
        }

        init();
    </script>
</body>
</html>
